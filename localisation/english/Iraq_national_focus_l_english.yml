IRQ_the_gathering_storm:0 "The Gathering Storm"
IRQ_the_gathering_storm_desc:0 "The Gulf War didn't spell an end to the conflict between Iraq and the US. A no fly zone, sanctions and bombings have been a disaster for Iraq's redevelopment. The spectre of another intervention hangs over Iraq as the US has made it clear of their desire to remove Saddam.\n One of the following must be true: \n US Desire to Invade is §R[?IRQ_US_Invasion_Desire]§! and it must be below §Y40§! to avoid war \n US Concerns of the invasion are §R[?IRQ_US_Invasion_Fear]§! and it must be above §Y40§! to reduce the risk of an invasion.\n The deadline is the Iraqi Resolution §Y3rd October 2002§!"
IRQ_weapon_inspectors:0 "Cooperate with Weapon Inspectors"
IRQ_weapon_inspectors_desc:0 "Further cooperation with UN weapon inspectors should ease some international concerns"
IRQ_full_weapon_inspectors:0 "Fully Cooperate with UN Inspectors"
IRQ_full_weapon_inspectors_desc:0 "Allowing inspectors into any and all of Iraq's restricted zones should once and for all put to rest concerns of our hostile intentions."
IRQ_cia_deals:0 "CIA Negotiations"
IRQ_cia_deals_desc:0 "Open negotiations would weaken our position at home and abroad, using back channel negotiations we have a chance to discretely resolve the conflict."
IRQ_offer_exile:0 "Offer Saddam's Exile"
IRQ_offer_exile_desc:0 "Cutting a deal for Saddam to go into exile with a small sum of $1 billion should be acceptable to the americans."
IRQ_crush_desenters:0 "Crush Descenters"
IRQ_crush_desenters_desc:0 "Saddam's grip on power is unquestioned, or it should remain so. Ensuring protestors and activists stay in line should ensure this."
IRQ_amnesty_for_exiles:0 "Amnesty for Exiles"
IRQ_amnesty_for_exiles_desc:0 "Too many bright Iraqis have fled our nation out of fear for their lives. Declaring an amnesty and a release of their loved ones should at least show the world that Iraq isn't the authoritarian state they believe us to be."
