l_english:
 IRQ_gulf_war_end:0 "A Nation Under Siege"
 IRQ_gulf_war_end_desc:0 "Our country is under UN sanctions and constant threats of anglo-american strikes with the spectre of the previous gulf war hanging over us. We must stand strong and move forward"
 IRQ_Saddam:0 "The Father Leader"
 IRQ_Saddam_desc:0 "The Father of the nation, Saddam Hussein has been leading our glorious country to a victory we will one day see."
 IRQ_Strengthen_Control:0 "Cult of Personality"
 IRQ_Strengthen_Control_desc:0 "The cult of personality around Saddam is strong and enduring. No matter what hardship our nation may find itself in it can always rely on the father of the nation."
 IRQ_improve_regional_stability:0 "Improve Regional Stability"
 IRQ_improve_regional_stability_desc:0 "The damage to infrastructure from the gulf war has yet to be fully rebuilt. Working with local officials to root out much more fixable problems will have positive outcomes."
 IRQ_deals_with_clans:0 "Deals with the Clans"
 IRQ_deals_with_clans_desc:0 "A lot of our nation is built upon inter-family relationships, these families or more accurately 'clans' are critical for keeping control over the more isolated pockets of the nation."
 IRQ_iranian_militias:0 "Shia Militias"
 IRQ_iranian_militias_desc:0 "There is a large minority of Shia muslims in Iraq, with our relations with iran it has been hard to utilise them fully. Offering concessions in exchange for their service should help bolster our forces however it might be unpopular with the more traditional voices in our government."
 IRQ_cross_border_smuggling:0 "Cross Border Smuggling"
 IRQ_cross_border_smuggling_desc:0 "Our borders are generally porous due to the sparse populations, tribal groups move between nations and so could components and systems be transported."
 IRQ_iranian_gambit:0 "The Iranian Gambit"
 IRQ_iranian_gambit_desc:0 "For many years the Persians have been our greatest foe, but like us they are isolated internationally with a similar hatred of the americans."
 IRQ_release_pows:0 "Release POWs"
 IRQ_release_pows_desc:0 "Releasing any remaining POWs and imprisoned Iranians will help settle our remaining tensions"
 IRQ_rebuild_trade:0 "Iranian Trade"
 IRQ_rebuild_trade_desc:0 "Trade with Iran could open up oppertunities for sanction busting using our vast oil reserves as payment. Chinese, Russian and potentially re-exported western components could become easier to acquire and thus reducing the pain of the UN sanctions."
 IRQ_handle_the_mek:0 "Handle the MEK"
 IRQ_handle_the_mek_desc:0 "Hosting a group that Iran considers as terrorists has strained our relations. Expelling the group and arresting its leaders will prove to Iran of our commitment to building trust. Some might say we are rolling over but they will see."
 IRQ_a_new_algiers:0 "A New Algeriers Agreement"
 IRQ_a_new_algiers_desc:0 "The last Algiers Agreement over the border between Iraq-Iran was torn up when the war broke out, offering to redraft it and sign should greatly ease the tensions."
 IRQ_offer_technical_assistence:0 "Offer Technical Assistence"
 IRQ_offer_technical_assistence_desc:0 "Although our military industry has weakened considerably we do have plenty of knowledge that the iranians would benefit hugely from us passing on."
 IRQ_joint_oil_development:0 "Joint Oil Development"
 IRQ_joint_oil_development_desc:0 "Two heads are better than one, working on joint projects in the rich oil basen will bring economic wealth to both our nations."
 IRQ_gulf_neutrality_agreement:0 "Gulf Neutrality Agreement"
 IRQ_gulf_neutrality_agreement_desc:0 "Initially to be created between Iran and Iraq we will draft a treaty that prohibits claims on eachothers international borders as well as a framework for conflict resolution. If this initiative is a success we could look to expanding it to the rest of the gulf."
 IRQ_iranian_arms:0 "Iranian Arms"
 IRQ_iranian_arms_desc:0 "Iranian arms might be able to fill the shortfalls in our equipment production that is needed to rebuild our army"
 IRQ_Democratic:0 "Relax Media Restrictions"
 IRQ_Democratic_desc:0 "The media has been restricted for too long, allowing some self-expression could lead to more important discourse to improve our nation."
 IRQ_UN_cooperation:0 "Cooperate with the UN"
 IRQ_UN_cooperation_desc:0 "To ease concerns around our weapons programs we must cooperate with UN inspectors."
 IRQ_french_concessions:0 "French Concessions"
 IRQ_french_concessions_desc:0 "We need western support for our cause, the French have indicated they are willing to root for us in the UN in exchange for access to our oil fields."
 IRQ_handle_the_blocks:0 "Handle the Blocks"
 IRQ_handle_the_blocks_desc:0 "The Oil-for-Food initiative funds continiously get blocked by UN disagreements primary by the US. A list of goods which are whitelisted and therefore do not need UN agreement would resolve a lot of the delays."
 IRQ_release_political_prisoners:0 "Release Political Prisoners"
 IRQ_release_political_prisoners_desc:0 "Releasing some of our prisoners who are being held for political reasons should help improve our image internationally."
 IRQ_reform_oil:0 "Reform the Oil Sector"
 IRQ_reform_oil_desc:0 "Our oil sector is very productive but in terms of efficiency it could be improved. We should start by overhauling the leadership to be meritocratic."
 IRQ_overhaul_security_directorate:0 "Overhaul the Security Directorate"
 IRQ_overhaul_security_directorate_desc:0 "Reforming the security directorate could radically change our nation but it would likely only weaken Saddam's hold"
 IRQ_kurdish_cooperation:0 "Kurdish Cooperation"
 IRQ_kurdish_cooperation_desc:0 "The kurds are autonomous in our lands, they still hold bitter feelings towards us. Improving relations could lead to a better economic and security relationship."
 IRQ_allow_shia_pilgrims:0 "Allow Shia Pilgrims"
 IRQ_allow_shia_pilgrims_desc:0 "The policy of restricting Shia, even more so foreign, pilgrims from visiting shrine cities must stop. Opening up Najaf and Karbala to the wider world wouldn't just increase religious tourism but would improve our relationship with Iran."
 IRQ_sideline_the_family:0 "Sideline the Family"
 IRQ_sideline_the_family_desc:0 "There can be no question about the ability of Saddam but some of his wider family are not quite as competent."
 IRQ_elections:0 "Elections at Last"
 IRQ_elections_desc:0 "UN supervised elections have been approved, this might usher in a new age of democracy in Iraq"
 IRQ_democracy_at_last:0 "Democracy at Last"
 IRQ_democracy_at_last_desc:0 "Every voice has had their chance to be heard, some might not find democracy appealing but it is the only way forward. This transition will ripple through the ages as we build a great nation."
 IRQ_new_era_of_baathism:0 "New Era of Ba'athism"
 IRQ_new_era_of_baathism_desc:0 "The strongest force in the region is without a doubt the Ba'athists and for too long have they oversaw the gradual decline of the great nation of Iraq. But let it not be forgotten that it was the Ba'athists who also built the nation, it was only the foolish leadership that oversaw our decline. Let us enter a new era of a strong Ba'athist party that has the will to reform our great nation."
 IRQ_once_more_into_the_breach:0 "Once More into the Breach"
 IRQ_once_more_into_the_breach_desc:0 "To take our place as the leader of the Arab world we must dismiss our shame and use our great armies against our foes once more. The world has changed and we must stay true to our cause."
 IRQ_shadow_rearming:0 "Shadow Rearming"
 IRQ_shadow_rearming_desc:0 "Sanctions have crippled Iraq's war industry but a concerted effort to smuggle through our borders and find alternative suppliers/methods might yield significant results. There are stocks of weapons all over the world just waiting to be bought up."
 IRQ_purge_the_military:0 "Purge the Military of Cowards"
 IRQ_purge_the_military_desc:0 "The military has been cowed by the gulf war and the Iran-Iraq war. We must remove those who would oppose another, every level must be investigated and punishments should be swift and severe. A smaller force of heroes will always defeat a horde of craven conscripts."
 IRQ_vengence:0 "Vengence"
 IRQ_vengence_desc:0 "The time has come, the drums of war are beating, our destiny has come. We must reclaim our lost lands and rightful teritory. Plans must be swiftly made so that a decisive blow can be dealt."
 IRQ_second_gulf_war:0 "Second Gulf War"
 IRQ_second_gulf_war_desc:0 "Leasons have been learnt from the previous wars, with our experience and a surprise attack there will be no one who can stop us. The will of the foreign powers to once more intervene has surely died off."
 IRQ_subjigate_kurdistan:0 "Subjugate Kurdistan"
 IRQ_subjigate_kurdistan_desc:0 "Kurdish autonomy has been a blight on our nation, the kurds profit while our people starve. Bringing them back under our flag will bring prosperity to all peoples."
 IRQ_walking_the_line:0 "Walking the Line"
 IRQ_walking_the_line_desc:0 "Giving in to the Americans would require the loss of our great leader, aggression would likely also be punished through another intervention. A careful approach to America should allow us to survive the storm."
 IRQ_ease_syrian_tensions:0 "Ease Syrian Tensions"
 IRQ_ease_syrian_tensions_desc:0 "Our Syrian neighbour has long been a source of distrust, their betrayal during the gulf war did not escape our notice. But as a fellow ba'athist nation we cannot just ignore their existence. Syria might be our only ally if we put the work in."
 IRQ_exile_saddam:0 "Exile Saddam"
 IRQ_exile_saddam_desc:0 "Sending Saddam into exile with a small sum of a billion dollars should show the world that the new Iraq isn't being shadow led by the old leadership"
 IRQ_seize_saddams_property:0 "Seize Saddam's properties"
 IRQ_seize_saddams_property_desc:0 "Saddam looted our land, selling off his vast fortune should help rebuild our nation"
 IRQ_recognise_kuwait_properly:0 "Truly Recognise Kuwait"
 IRQ_recognise_kuwait_properly_desc:0 "We begrudgenly recognised kuwait while refusing to accept responsibility for the war. Putting on a show for them and expressing our regret over our actions would definitely be the start to a better relationship."
 IRQ_demilitarise_the_border:0 "Demilitarise the Border"
 IRQ_demilitarise_the_border_desc:0 "Kuwait is undefendable against an Iraqi attack, if we demilitarise our border with them it will remove any anxieties of a surprise attack."
 IRQ_resolve_gulf_debt:0 "Resolve our Gulf Debt"
 IRQ_resolve_gulf_debt_desc:0 "Focusing some of our oil exports to pay off debts from Kuwait and UAE might rebuild some trust. It should also ease international concern over investments as we are no longer defaulting on loans."
 IRQ_join_GCC_security_dialogues:0 "Join GCC Security Dialogue"
 IRQ_join_GCC_security_dialogues_desc:0 "Working with the GCC on security should help ease anxieties in the region and rebuild our international standing. It is the gulf states that are most concerned about our military industry."
 IRQ_kirkuk_banias_pipeline:0 "Kirkuk-Banias Pipeline"
 IRQ_kirkuk_banias_pipeline_desc:0 "Restarting, even partially, the Kirkuk-Banias pipeline could lead to a large alternative export of our oil, potentially avoiding the UN sanctions and thus be useful in reducing our vulnerability to them."
 IRQ_resolve_syrian_border:0 "Resolve Syrian Border Disputes"
 IRQ_resolve_syrian_border_desc:0 "The Syrian border is most uninhabitated desert, tribes that move through have no allegiance to either of our nations. Negotiating with "
 IRQ_umm_alqura_mosque:0 "Umm al-Qura Mosque"
 IRQ_umm_alqura_mosque_desc:0 "Finally the grandest mosque in the world will be completed, every muslim and not will be in awe of our achievements"
 IRQ_allow_foreign_NGOs:0 "Allow in Foreign NGOs"
 IRQ_allow_foreign_NGOs_desc:0 ""
 IRQ_diminish_the_republican_guard:0 "Diminish The Republican Guard"
 IRQ_diminish_the_republican_guard_desc:0 "Diverting newer arms/equipment toward the armed forces instead of the guard should be a subtle method to weaken the influence of the republican guard."
 IRQ_repurpose_military_industry:0 "Repurpose Military Industry"
 IRQ_repurpose_military_industry_desc:0 "Dormant factories and those running on scraps would be better repurposed towards creating the civilian goods we lack."
 IRQ_reforms_for_investments:0 "Reforms for Investments"
 IRQ_reforms_for_investments_desc:0 "The international community is eager to invest in our nation if it wasn't for the blockade. Offering reforms to our legal system should create more legal routes for investments into our nation."
 IRQ_sway_border_tribes:0 "Sway Border Tribes"
 IRQ_sway_border_tribes_desc:0 ""
 IRQ_president_for_life:0 "President for Life"
 IRQ_father_leader:0 "Father Leader"
 IRQ_sword_of_arabs:0 "The Knight of the Arabs"
 IRQ_lion_of_tikrit:0 "The Lion of Tikrit"
 IRQ_leader_necessity:0 "Leader-Necessity"
 IRQ_the_successor_of_nebuchadnezzar:0 "The Successor of Nebuchadnezzar"
 IRQ_joint_syrian_exercises:0 "Join Syrian Exercises"
 IRQ_joint_syrian_exercises_desc:0 ""
 IRQ_joint_oil:0 "Iraqi-Persian Oil Project"
 IRQ_joint_oil_desc:0 "The IPOP is a testiment to a new working relationship between Iran and Iraq for the purposes of joint oil extraction."
 IRQ_smuggling:0 "Border Smuggling"
 IRQ_smuggling_desc:0 "Borders tend to be porous, especially in less populated areas. Throw in a bribe here and there and even checkpoints can be crossed with goods"
 IRQ_focus_events.1.t:0 "New Leadership for the Security Directorate"
 IRQ_focus_events.1.d:0 "Informally the directorate has been under the control of Subawi Ibrahim al-Tikriti for some time. For the nation to pull itself out of the mire it must do away with the nepotistic hire and bring in someone who can steer it the right way."
  IRQ_focus_events.1.o1:0 "A Stable Technocrat"
 IRQ_focus_events.1.o2:0 "A More Liberal Choice"
 IRQ_focus_events.1.o3:0 "A Party Loyalist"
 IRQ_focus_events.1.o4:0 "The Obvious Choice"
 IRQ_focus_events.3.t:0 "Iraqi Border Negotiations"
 IRQ_focus_events.3.d:0 "The Iraqis have come to the table to settle the border finally. They have dropped their claims on the contested settlements and hope we do the same."
 IRQ_focus_events.3.o1:0 "The Squabbles are Behind Us"
 IRQ_focus_events.3.o2:0 "We Deserve More"
 IRQ_focus_events.4.t:0 "Iraq Demands Integration"
 IRQ_focus_events.4.d:0 "Once again Iraq has demanded that we are subjected to the full authority of Damascus"
 IRQ_focus_events.4.o1:0 "We Bitterly Accept"
 IRQ_focus_events.4.o2:0 "Death Before Dishonour"
 IRQ_focus_events.5.t:0 "Gulf Neutrality Agreement"
 IRQ_focus_events.5.d:0 "The Iraqis have sworn the days of the Iran-Iraq war are long past and have shown their regrets. To avoid any war again they have offered to sign a declaration of friendship and peace"
 IRQ_focus_events.5.o1:0 "Finally, Peace in the Middle East"
 IRQ_focus_events.5.o2:0 "We Cannot Trust Them"
 IRQ_focus_events.7.t:0 "Iraq-Iran War POW Exchange"
 IRQ_focus_events.7.d:0 "Iraq has generously released all of their remaining POWs and prisoners related to the Iran-Iraq war. They have not demanded that we do the same however there is political pressure on us to."
 IRQ_focus_events.7.o1:0 "Too Little Too Late"
 IRQ_focus_events.7.o2:0 "Let the People Go Home"
 IRQ_focus_events.8.t:0 "A New Algiers"
 IRQ_focus_events.8.d:0 "Iraq has broached the prospect of returning to the Treaty of Algiers they so unceremoneously tore up"
 IRQ_focus_events.8.o1:0 "Finally Peace"
 IRQ_focus_events.8.o2:0 "Let the Treaty Stay Dead"
 IRQ_focus_events.9.t:0 "Sidelining the Family"
 IRQ_focus_events.9.d:0 "The Husseins have had an iron grip on all the instituions of Iraq for some time. Their corruption and brutality is without question but would a replacement be any better? The Americans have long detested Uday but removing him or his brother would be a challenge to do without bloodshed."
 IRQ_focus_events.9.o1:0 "Gradually Shift Away"
 IRQ_focus_events.9.o2:0 "Arrest Them Immediately"
 IRQ_focus_events.10.t:0 "Handling the MEK"
 IRQ_focus_events.10.d:0 "The MEK has long been seen as a threat or at least an irritation of the Iranian regime. We have decided to handle them but how?"
 IRQ_focus_events.10.o1:0 "Hand Their Leaders Over"
 IRQ_focus_events.10.o2:0 "Internally Prosecute"
 IRQ_demand_tribal_uprisings:0 "Demand Tribal Uprising"
 IRQ_demand_tribal_uprisings_desc:0 "We have given gifts and support for border tribes for some time. Our more concerted efforts recently should lead to their support against our enemies"
