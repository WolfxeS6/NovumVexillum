 IRQ_full_weapon_inspectors_desc:0 ""
 IRQ_cia_deals:0 "Cia Deals"
 IRQ_cia_deals_desc:0 "Attempting to deal with the CIA is risky and has no definite outcome"
 IRQ_offer_exile:0 "Offer Saddam's Exile"
 IRQ_offer_exile_desc:0 "The CIA have broached the idea of exile. This might be the only way to avoid invasion"
 IRQ_crush_desenters:0 "Crush Dissenters "
 IRQ_crush_desenters_desc:0 ""
 IRQ_construct_babylonian_walls:0 "Finish the Walls of Babylon"
 IRQ_construct_babylonian_walls_desc:0 "The walls have been in a state of partial completion for some time, sanctions have delayed the completion of the work"
